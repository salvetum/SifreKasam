<!DOCTYPE html>
<html lang="tr" class="dark" data-bs-theme="dark" data-glass-effects="on" data-glass-quality="normal" data-kasa-background="aurora" data-kasa-motion="on" data-kasa-gradient="on">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ŞifreKasam güvenli giriş ekranı hazırlanıyor.">
    <meta name="theme-color" content="#080912">
    <meta name="color-scheme" content="dark light">
    <title>ŞifreKasam - Yükleniyor</title>
    <script>
        const copy = {
            tr: {
                badge: 'Yerel ve güvenli',
                title: 'ŞifreKasam açılıyor',
                subtitle: 'Şifreleme, yerel kasa ve giriş ekranı hazırlanıyor.',
                step1: 'Güvenli oturum hazırlanıyor',
                step2: 'ŞifreKasam verileri kontrol ediliyor',
                step3: 'Giriş ekranı çağrılıyor',
                language: 'Dil',
                statusTitle: 'Yükleme durumu',
            },
            en: {
                badge: 'Local and secure',
                title: 'Opening ŞifreKasam',
                subtitle: 'Encryption, local vault, and sign-in screen are being prepared.',
                step1: 'Preparing secure session',
                step2: 'Checking ŞifreKasam data',
                step3: 'Loading sign-in screen',
                language: 'Language',
                statusTitle: 'Loading status',
            },
        };

        const normalizeHex = (value, fallback = '#7c6ff7') => {
            const raw = String(value || '').trim();
            const hex = raw.startsWith('#') ? raw : '#' + raw;
            return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex.toLowerCase() : fallback;
        };

        const hexToRgb = (hex) => {
            const clean = normalizeHex(hex).slice(1);
            return [
                parseInt(clean.slice(0, 2), 16),
                parseInt(clean.slice(2, 4), 16),
                parseInt(clean.slice(4, 6), 16),
            ].join(', ');
        };

        const mixColor = (hex, targetHex = '#38bdf8', amount = 0.45) => {
            const first = normalizeHex(hex).slice(1);
            const second = normalizeHex(targetHex, '#38bdf8').slice(1);
            const channel = (start, end) =>
                Math.round(start + (end - start) * amount).toString(16).padStart(2, '0');
            return '#' + channel(parseInt(first.slice(0, 2), 16), parseInt(second.slice(0, 2), 16))
                + channel(parseInt(first.slice(2, 4), 16), parseInt(second.slice(2, 4), 16))
                + channel(parseInt(first.slice(4, 6), 16), parseInt(second.slice(4, 6), 16));
        };

        function applyLanguage(lang) {
            const selected = copy[copy[lang] ? lang : 'tr'];
            document.documentElement.lang = copy[lang] ? lang : 'tr';
            document.querySelectorAll('[data-i18n]').forEach((node) => {
                node.textContent = selected[node.dataset.i18n] || node.textContent;
            });
            const select = document.getElementById('entry-language-select');
            if (select) {
                select.value = copy[lang] ? lang : 'tr';
                select.setAttribute('aria-label', selected.language);
            }
        }

        function applyAppearance(params) {
            const theme = (params.get('theme') || localStorage.getItem('kasa-theme')) === 'light' ? 'light' : 'dark';
            const glass = (params.get('glassEffects') || localStorage.getItem('kasa-glass-effects')) === 'off' ? 'off' : 'on';
            const glassQuality = ['low', 'normal', 'high'].includes(params.get('glassQuality') || localStorage.getItem('kasa-glass-quality'))
                ? (params.get('glassQuality') || localStorage.getItem('kasa-glass-quality'))
                : 'normal';
            const motion = (params.get('motion') || localStorage.getItem('kasa-animated-backgrounds')) === 'off' ? 'off' : 'on';
            const gradients = (params.get('gradients') || localStorage.getItem('kasa-gradients')) === 'off' ? 'off' : 'on';
            const accent = normalizeHex(params.get('accent') || localStorage.getItem('kasa-accent'));
            const accent2 = mixColor(accent);
            const background = ['aurora', 'midnight', 'mesh', 'plain'].includes(params.get('background') || localStorage.getItem('kasa-background'))
                ? (params.get('background') || localStorage.getItem('kasa-background'))
                : 'aurora';

            document.documentElement.classList.toggle('dark', theme !== 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.documentElement.setAttribute('data-glass-effects', glass);
            document.documentElement.setAttribute('data-glass-quality', glassQuality);
            document.documentElement.setAttribute('data-kasa-background', background);
            document.documentElement.setAttribute('data-kasa-motion', motion);
            document.documentElement.setAttribute('data-kasa-gradient', gradients);
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--accent-2', accent2);
            document.documentElement.style.setProperty('--accent-rgb', hexToRgb(accent));
            document.documentElement.style.setProperty('--accent-2-rgb', hexToRgb(accent2));

            localStorage.setItem('kasa-theme', theme);
            localStorage.setItem('kasa-glass-effects', glass);
            localStorage.setItem('kasa-glass-quality', glassQuality);
            localStorage.setItem('kasa-animated-backgrounds', motion);
            localStorage.setItem('kasa-gradients', gradients);
            localStorage.setItem('kasa-accent', accent);
            localStorage.setItem('kasa-background', background);
        }

        try {
            const params = new URLSearchParams(location.search);
            const lang = copy[params.get('lang')] ? params.get('lang') : (localStorage.getItem('kasa-lang') || 'tr');
            applyAppearance(params);
            localStorage.setItem('kasa-lang', copy[lang] ? lang : 'tr');

            document.addEventListener('DOMContentLoaded', () => {
                applyLanguage(lang);
                document.getElementById('entry-language-select')?.addEventListener('change', function () {
                    const nextLang = copy[this.value] ? this.value : 'tr';
                    localStorage.setItem('kasa-lang', nextLang);
                    applyLanguage(nextLang);
                    fetch('/settings/language', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ language: nextLang }),
                    }).catch(() => {});
                });
                if (params.get('redirect')) {
                    setTimeout(() => { window.location.href = '/?entry=loading'; }, 560);
                }
            });
        } catch (_) {
            document.documentElement.classList.add('dark');
        }

        function transitionToApp() {
            document.body.classList.add('kasa-exit');
            return new Promise((resolve) => setTimeout(resolve, 240));
        }
    </script>
    <style>
        * { box-sizing: border-box; }

        .loading-sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        :root {
            --bg: #080912;
            --bg-2: #101326;
            --panel: rgba(16, 19, 38, 0.68);
            --panel-strong: rgba(255, 255, 255, 0.09);
            --text: #eef2ff;
            --muted: #9aa3b8;
            --line: rgba(255, 255, 255, 0.14);
            --accent: #7c6ff7;
            --accent-2: #38bdf8;
            --accent-rgb: 124, 111, 247;
            --accent-2-rgb: 56, 189, 248;
            --success: #22c55e;
            --entry-blur: blur(32px) saturate(1.18);
            --status-blur: blur(18px);
        }

        [data-bs-theme="light"] {
            --bg: #eef2ff;
            --bg-2: #ffffff;
            --panel: rgba(255, 255, 255, 0.76);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --text: #172033;
            --muted: #5b6477;
            --line: rgba(31, 41, 55, 0.13);
        }

        [data-glass-quality="low"] {
            --entry-blur: blur(14px) saturate(1.04);
            --status-blur: blur(6px);
        }

        [data-glass-quality="high"] {
            --entry-blur: blur(40px) saturate(1.22);
            --status-blur: blur(24px);
        }

        @font-face {
            font-family: 'Sora';
            font-style: normal;
            font-weight: 300 800;
            src: url('../static/fonts/sora.woff2') format('woff2');
            font-display: swap;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            overflow: hidden;
            color: var(--text);
            font-family: 'Sora', system-ui, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(var(--accent-rgb), 0.34), transparent 34%),
                radial-gradient(circle at 84% 84%, rgba(var(--accent-2-rgb), 0.22), transparent 38%),
                linear-gradient(145deg, var(--bg), var(--bg-2));
        }

        [data-kasa-background="midnight"] body {
            background:
                radial-gradient(circle at 50% -10%, rgba(var(--accent-rgb), 0.22), transparent 38%),
                linear-gradient(145deg, #050713, #101326 58%, #060816);
        }

        [data-kasa-background="mesh"] body {
            background:
                radial-gradient(circle at 12% 20%, rgba(var(--accent-rgb), 0.30), transparent 34%),
                radial-gradient(circle at 90% 10%, rgba(var(--accent-2-rgb), 0.24), transparent 34%),
                radial-gradient(circle at 70% 90%, rgba(34, 197, 94, 0.14), transparent 36%),
                linear-gradient(145deg, #080912, #111827);
        }

        [data-kasa-background="plain"] body {
            background: linear-gradient(145deg, var(--bg), var(--bg-2));
        }

        [data-kasa-gradient="off"] body {
            background: var(--bg);
        }

        [data-bs-theme="light"][data-kasa-gradient="off"] body {
            background: #f8fafc;
        }

        [data-bs-theme="light"][data-kasa-background="midnight"] body,
        [data-bs-theme="light"][data-kasa-background="mesh"] body,
        [data-bs-theme="light"][data-kasa-background="aurora"] body {
            background:
                radial-gradient(circle at 18% 12%, rgba(var(--accent-rgb), 0.16), transparent 34%),
                radial-gradient(circle at 84% 84%, rgba(var(--accent-2-rgb), 0.14), transparent 38%),
                linear-gradient(145deg, #eef2ff, #ffffff);
        }

        body::before {
            content: '';
            position: fixed;
            inset: -2px;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at center, black, transparent 76%);
            animation: grid-drift 12s linear infinite;
        }

        [data-glass-effects="off"] body::before,
        [data-kasa-background="plain"] body::before,
        [data-kasa-gradient="off"] body::before {
            display: none;
        }

        [data-kasa-motion="off"] body::before {
            animation: none;
        }

        @keyframes grid-drift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(0, 48px, 0); }
        }

        .entry-shell {
            position: relative;
            width: min(980px, calc(100vw - 32px));
            min-height: 540px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 34px;
            background:
                radial-gradient(circle at 12% 0%, rgba(var(--accent-rgb), 0.16), transparent 36%),
                linear-gradient(145deg, var(--panel), rgba(255,255,255,0.035));
            box-shadow:
                0 34px 110px rgba(0, 0, 0, 0.38),
                inset 0 1px 0 rgba(255,255,255,0.13);
            backdrop-filter: var(--entry-blur);
            -webkit-backdrop-filter: var(--entry-blur);
            animation: enter 440ms cubic-bezier(0.16, 1, 0.3, 1) both;
            transition: transform 240ms cubic-bezier(0.16, 1, 0.3, 1), border-color 240ms ease, box-shadow 240ms ease;
            z-index: 2;
        }

        .entry-shell::before {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            pointer-events: none;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.17), transparent 30%),
                radial-gradient(circle at 86% 16%, rgba(var(--accent-2-rgb), 0.16), transparent 34%);
            mask-image: linear-gradient(#000, transparent 72%);
        }

        .entry-shell:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 38px 116px rgba(0, 0, 0, 0.44), 0 0 38px rgba(var(--accent-rgb), 0.16);
        }

        .entry-shell:active {
            transform: translateY(0) scale(0.998);
        }

        [data-glass-effects="off"] .entry-shell {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(var(--accent-rgb), 0.26);
            background:
                radial-gradient(circle at 12% 0%, rgba(var(--accent-rgb), 0.12), transparent 36%),
                rgba(10, 13, 29, 0.98);
            box-shadow: 0 34px 110px rgba(0, 0, 0, 0.48);
        }

        [data-bs-theme="light"][data-glass-effects="off"] .entry-shell {
            background:
                radial-gradient(circle at 12% 0%, rgba(var(--accent-rgb), 0.10), transparent 36%),
                rgba(255,255,255,0.98);
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(16px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .entry-left,
        .entry-right {
            position: relative;
            z-index: 1;
            padding: clamp(28px, 5vw, 48px);
        }

        .entry-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 42px;
        }

        .entry-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .entry-pill,
        .language-box {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            color: var(--muted);
            transition: transform 180ms cubic-bezier(0.16,1,0.3,1), background 180ms ease, border-color 180ms ease;
        }

        .entry-pill {
            gap: 9px;
            width: max-content;
            padding: 8px 13px;
            font-size: 0.78rem;
        }

        .entry-pill::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--success);
            box-shadow: 0 0 18px rgba(34, 197, 94, 0.55);
        }

        .language-box {
            gap: 8px;
            padding: 7px 10px;
            font-size: 0.74rem;
        }

        .entry-pill:hover,
        .language-box:hover,
        .language-box:focus-within {
            transform: translateY(-1px);
            border-color: rgba(var(--accent-rgb), 0.34);
            background: rgba(var(--accent-rgb), 0.10);
        }

        .entry-pill:active,
        .language-box:active {
            transform: translateY(0) scale(0.985);
        }

        .language-box select {
            border: 0;
            outline: 0;
            color: var(--text);
            background: transparent;
            font: inherit;
            cursor: pointer;
        }

        .language-box option {
            color: var(--text);
            background: var(--bg-2);
        }

        .brand-lock {
            width: 88px;
            height: 88px;
            display: grid;
            place-items: center;
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.18), transparent),
                linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 22px 54px rgba(var(--accent-rgb), 0.34);
            color: #fff;
            font-size: 2.15rem;
            font-weight: 800;
            letter-spacing: -0.08em;
        }

        h1 {
            margin: 24px 0 0;
            max-width: 520px;
            font-size: clamp(2.6rem, 7vw, 5rem);
            line-height: 0.94;
            letter-spacing: -0.08em;
        }

        .subtitle {
            max-width: 460px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        .entry-right {
            display: grid;
            place-items: center;
            border-left: 1px solid var(--line);
            background:
                radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.18), transparent 42%),
                rgba(255,255,255,0.035);
        }

        .status-card {
            width: min(360px, 100%);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background:
                radial-gradient(circle at 20% 0%, rgba(var(--accent-rgb), 0.12), transparent 38%),
                var(--panel-strong);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
            backdrop-filter: var(--status-blur);
            -webkit-backdrop-filter: var(--status-blur);
            transition: transform 220ms cubic-bezier(0.16,1,0.3,1), border-color 220ms ease, background 220ms ease, box-shadow 220ms ease;
        }

        [data-glass-effects="off"] .status-card {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(var(--accent-rgb), 0.24);
            background:
                radial-gradient(circle at 20% 0%, rgba(var(--accent-rgb), 0.12), transparent 38%),
                rgba(20, 24, 43, 0.98);
        }

        [data-bs-theme="light"][data-glass-effects="off"] .status-card {
            background:
                radial-gradient(circle at 20% 0%, rgba(var(--accent-rgb), 0.10), transparent 38%),
                rgba(255,255,255,0.98);
        }

        .status-card:hover {
            transform: translateY(-2px);
            border-color: rgba(var(--accent-rgb), 0.30);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 22px 56px rgba(0,0,0,0.22);
        }

        .status-card:active {
            transform: translateY(0) scale(0.995);
        }

        .loader-ring {
            position: relative;
            width: 132px;
            height: 132px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent), var(--accent-2), var(--accent));
            animation: spin 1.65s linear infinite;
        }

        .loader-ring::after {
            content: 'SK';
            position: absolute;
            inset: 10px;
            display: grid;
            place-items: center;
            border-radius: inherit;
            background: var(--bg);
            color: var(--text);
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.08em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-list {
            display: grid;
            gap: 12px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .status-list span {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-list span::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 18px rgba(34, 197, 94, 0.55);
        }

        .progress-track {
            height: 8px;
            margin-top: 24px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
        }

        .progress-fill {
            width: 46%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            animation: slide 1.35s ease-in-out infinite;
        }

        @keyframes slide {
            from { transform: translateX(-115%); }
            to { transform: translateX(255%); }
        }

        body.kasa-exit .entry-shell {
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
            transition: opacity 220ms ease, transform 220ms ease;
        }

        @media (max-width: 780px) {
            body {
                overflow: auto;
            }

            .entry-shell {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .entry-topline {
                align-items: flex-start;
                flex-direction: column;
            }

            .entry-right {
                border-left: 0;
                border-top: 1px solid var(--line);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main class="entry-shell" aria-labelledby="loading-title">
        <section class="entry-left" aria-labelledby="loading-title">
            <div class="entry-topline">
                <div class="entry-pill">
                    <span data-i18n="badge">Yerel ve güvenli</span>
                </div>
                <label class="language-box" for="entry-language-select">
                    <span data-i18n="language">Dil</span>
                    <select id="entry-language-select" aria-label="Dil">
                        <option value="tr">TR</option>
                        <option value="en">EN</option>
                    </select>
                </label>
            </div>

            <div>
                <div class="brand-lock" aria-hidden="true">K</div>
                <h1 id="loading-title" data-i18n="title">ŞifreKasam açılıyor</h1>
                <p class="subtitle" data-i18n="subtitle">Şifreleme, yerel kasa ve giriş ekranı hazırlanıyor.</p>
            </div>
        </section>

        <section class="entry-right" aria-labelledby="loading-status-title">
            <div class="status-card" role="status" aria-live="polite">
                <h2 id="loading-status-title" class="loading-sr-only" data-i18n="statusTitle">Yükleme durumu</h2>
                <div class="loader-ring" aria-hidden="true"></div>
                <div class="status-list">
                    <span data-i18n="step1">Güvenli oturum hazırlanıyor</span>
                    <span data-i18n="step2">ŞifreKasam verileri kontrol ediliyor</span>
                    <span data-i18n="step3">Giriş ekranı çağrılıyor</span>
                </div>
                <div class="progress-track" aria-hidden="true">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
