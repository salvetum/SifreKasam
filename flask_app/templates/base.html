<!DOCTYPE html>
<html lang="{{ CURRENT_LANG|default('tr') }}" class="dark" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <style nonce="{{ csp_nonce }}" id="kasa-runtime-styles"></style>
    <script nonce="{{ csp_nonce }}">
        window.LANG = {{ CURRENT_LANG|tojson }};
        window.TRANSLATIONS = {{ TRANSLATIONS|tojson }};
        window.AVAILABLE_LANGS = {{ AVAILABLE_LANGS|tojson }};
        window.KASA_STATIC_URLS = {
            zxcvbn: "{{ url_for('static', filename='zxcvbn.js') }}?v=1",
        };
        window._ = function (key) {
            return window.TRANSLATIONS[key] || key;
        };

        const kasaRuntimeStyles = new Map();
        window.KASA_SET_RUNTIME_STYLE = function (key, cssText) {
            const runtimeStyle = document.getElementById('kasa-runtime-styles');
            if (!runtimeStyle || !key) return;
            if (cssText) kasaRuntimeStyles.set(key, cssText);
            else kasaRuntimeStyles.delete(key);
            runtimeStyle.textContent = Array.from(kasaRuntimeStyles.values()).join('\n');
        };

        const storedTheme = localStorage.getItem('kasa-theme') || "{{ SAVED_THEME }}";
        if (storedTheme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-bs-theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        }
        localStorage.setItem('kasa-theme', storedTheme === 'light' ? 'light' : 'dark');

        const storedGlassEffects = localStorage.getItem('kasa-glass-effects') || "{{ 'on' if GLASS_EFFECTS_ENABLED else 'off' }}";
        const normalizedGlassEffects = storedGlassEffects === 'off' ? 'off' : 'on';
        document.documentElement.setAttribute('data-glass-effects', normalizedGlassEffects);
        localStorage.setItem('kasa-glass-effects', normalizedGlassEffects);

        const normalizeGlassQuality = function (value) {
            return ['low', 'normal', 'high'].includes(value) ? value : 'normal';
        };
        const storedGlassQuality = normalizeGlassQuality(localStorage.getItem('kasa-glass-quality') || "{{ GLASS_QUALITY|default('normal') }}");
        document.documentElement.setAttribute('data-glass-quality', storedGlassQuality);
        localStorage.setItem('kasa-glass-quality', storedGlassQuality);

        const storedMotion = localStorage.getItem('kasa-animated-backgrounds') || "{{ 'on' if ANIMATED_BACKGROUNDS_ENABLED else 'off' }}";
        const normalizedMotion = storedMotion === 'off' ? 'off' : 'on';
        document.documentElement.setAttribute('data-kasa-motion', normalizedMotion);
        localStorage.setItem('kasa-animated-backgrounds', normalizedMotion);

        const storedAnimations = localStorage.getItem('kasa-interface-animations') || "{{ 'on' if INTERFACE_ANIMATIONS_ENABLED else 'off' }}";
        const normalizedAnimations = storedAnimations === 'off' ? 'off' : 'on';
        document.documentElement.setAttribute('data-kasa-animations', normalizedAnimations);
        localStorage.setItem('kasa-interface-animations', normalizedAnimations);

        const storedGradients = localStorage.getItem('kasa-gradients') || "{{ 'on' if GRADIENTS_ENABLED else 'off' }}";
        const normalizedGradients = storedGradients === 'off' ? 'off' : 'on';
        document.documentElement.setAttribute('data-kasa-gradient', normalizedGradients);
        localStorage.setItem('kasa-gradients', normalizedGradients);

        const normalizeHexColor = function (value, fallback) {
            const raw = String(value || '').trim();
            const hex = raw.startsWith('#') ? raw : '#' + raw;
            return /^#[0-9a-fA-F]{6}$/.test(hex) ? hex.toLowerCase() : fallback;
        };
        const hexToRgb = function (hex) {
            const clean = normalizeHexColor(hex, '#7c6ff7').slice(1);
            return [
                parseInt(clean.slice(0, 2), 16),
                parseInt(clean.slice(2, 4), 16),
                parseInt(clean.slice(4, 6), 16),
            ].join(', ');
        };
        const mixColor = function (hex, targetHex, amount) {
            const a = normalizeHexColor(hex, '#7c6ff7').slice(1);
            const b = normalizeHexColor(targetHex, '#38bdf8').slice(1);
            const channel = function (start, end) {
                return Math.round(start + (end - start) * amount).toString(16).padStart(2, '0');
            };
            return '#' + channel(parseInt(a.slice(0, 2), 16), parseInt(b.slice(0, 2), 16))
                + channel(parseInt(a.slice(2, 4), 16), parseInt(b.slice(2, 4), 16))
                + channel(parseInt(a.slice(4, 6), 16), parseInt(b.slice(4, 6), 16));
        };
        const applyKasaAppearance = function (accent, background) {
            const normalizedAccent = normalizeHexColor(accent, "{{ ACCENT_COLOR|default('#7c6ff7') }}");
            const normalizedBackground = ['aurora', 'midnight', 'mesh', 'plain'].includes(background) ? background : "{{ BACKGROUND_STYLE|default('aurora') }}";
            const accent2 = mixColor(normalizedAccent, '#38bdf8', 0.45);
            window.KASA_SET_RUNTIME_STYLE('appearance', `html:root {
                --accent: ${normalizedAccent};
                --accent-2: ${accent2};
                --accent-rgb: ${hexToRgb(normalizedAccent)};
                --accent-2-rgb: ${hexToRgb(accent2)};
            }`);
            document.documentElement.setAttribute('data-kasa-background', normalizedBackground);
            localStorage.setItem('kasa-accent', normalizedAccent);
            localStorage.setItem('kasa-background', normalizedBackground);
            window.KASA_APPEARANCE = { accent: normalizedAccent, background: normalizedBackground };
        };
        applyKasaAppearance(
            localStorage.getItem('kasa-accent') || "{{ ACCENT_COLOR|default('#7c6ff7') }}",
            localStorage.getItem('kasa-background') || "{{ BACKGROUND_STYLE|default('aurora') }}"
        );

        const entryParams = new URLSearchParams(window.location.search);
        const skipFirstFade = entryParams.get('entry') === 'loading' || entryParams.get('skipFade') === '1';
        if (!sessionStorage.getItem('kasa-loaded')) {
            sessionStorage.setItem('kasa-loaded', '1');
            if (!skipFirstFade) {
                document.documentElement.classList.add('kasa-first-load');
            }
        }
    </script>
    <style nonce="{{ csp_nonce }}">
        html.kasa-first-load { opacity: 0; }
        html.kasa-first-load-enter {
            opacity: 1;
            transition: opacity 0.25s ease;
        }
    </style>
    <title>{{ title or 'ŞifreKasam | Güvenli Şifre Yöneticisi' }}</title>

    <!-- Meta Tags -->
    <meta name="description" content="ŞifreKasam v2.5.8 - Güvenli, hızlı ve modern masaüstü şifre yöneticiniz.">
    <meta name="theme-color" content="#080912">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ŞifreKasam">
    <link rel="manifest" href="{{ url_for('manifest_json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}">

    <!-- Local utility CSS (offline Tailwind subset) -->
    <link href="{{ url_for('static', filename='tailwind-lite.css') }}?v=1.2" rel="stylesheet">

    <!-- Font Awesome (Local) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='all.min.css') }}">

    <!-- Local UI libraries -->
    <link href="{{ url_for('static', filename='sweetalert2.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='toastify.min.css') }}" rel="stylesheet">

    <!-- Bootstrap kept for backward compat (Accordion, Collapse toggles in saglik.html) -->
    <link href="{{ url_for('static', filename='bootstrap.min.css') }}" rel="stylesheet">

    <!-- Our Custom CSS -->
    <link href="{{ url_for('static', filename='style.css') }}?v=54" rel="stylesheet">
</head>
<body class="bg-kasa-bg text-kasa-text font-sans min-h-screen overflow-y-scroll">

    <!-- 3. Animasyonlu Blob (opsiyonel) -->
    <div class="blob-accent" aria-hidden="true"></div>

    <div class="page-loading-overlay" role="status" aria-live="polite" aria-hidden="true" aria-label="{{ _('Sayfa yükleniyor') }}">
        <div class="page-loading-card">
            <div class="page-loading-mark" aria-hidden="true"><i class="fa-solid fa-lock"></i></div>
            <div>
                <div class="page-loading-title">{{ _('Yükleniyor') }}</div>
                <div class="page-loading-subtitle">{{ _('Sayfa hazırlanıyor') }}</div>
            </div>
            <div class="page-loading-track"><div></div></div>
        </div>
    </div>

    <div class="power-save-overlay" role="status" aria-live="polite" aria-hidden="true">
        <div class="power-save-card">
            <div class="power-save-mark" aria-hidden="true"><i class="fa-solid fa-leaf"></i></div>
            <div class="power-save-copy">
                <strong data-power-save-title>{{ _('Tasarruf modu') }}</strong>
                <span data-power-save-subtitle>{{ _('ŞifreKasam arka planda kaynak kullanımını azaltıyor.') }}</span>
            </div>
            <div class="power-save-dots" aria-hidden="true"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div id="kasa-page-shell" class="{% block page_shell_class %}max-w-6xl mx-auto px-4 py-10{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <!-- JS Libraries -->
    <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='sweetalert2.all.min.js') }}" defer></script>
    <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='toastify.min.js') }}?v=2" defer></script>

    <!-- Our Custom Scripts -->
    <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='app.js') }}?v=9.7" defer></script>

    <!-- First-load fade-in tetikleyici -->
    <script nonce="{{ csp_nonce }}">
        if (document.documentElement.classList.contains('kasa-first-load')) {
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    document.documentElement.classList.add('kasa-first-load-enter');
                });
            });
        }
    </script>

    <!-- Auto-lock Script -->
    <script nonce="{{ csp_nonce }}">
        {% if AUTO_LOCK_ENABLED %}
        let idleTime = 0;
        const lockThreshold = {{ AUTO_LOCK_TIMEOUT }};
        let automaticLockPending = false;
        function lockVaultAndRedirect() {
            if (automaticLockPending) return;
            automaticLockPending = true;
            fetch('{{ url_for("lock") }}', { method: 'POST' })
                .then(function (response) {
                    if (!response.ok) throw new Error('lock-failed');
                    window.location.replace('{{ url_for("login") }}');
                })
                .catch(function () {
                    automaticLockPending = false;
                    idleTime = 0;
                    clearPageLoadingOverlay();
                });
        }
        function timerIncrement() {
            idleTime++;
            if (idleTime >= lockThreshold) {
                lockVaultAndRedirect();
            }
        }
        let idleInterval = setInterval(timerIncrement, 60000);
        function resetTimer() { idleTime = 0; }
        ['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'].forEach(
            event => document.addEventListener(event, resetTimer, true)
        );
        {% endif %}
    </script>

    <!-- Kısayol: Ctrl+L ile kilit -->
    <script nonce="{{ csp_nonce }}">
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                if (window.location.pathname !== '{{ url_for("login") }}') {
                    if (typeof lockVaultAndRedirect === 'function') {
                        lockVaultAndRedirect();
                    } else {
                        fetch('{{ url_for("lock") }}', { method: 'POST' })
                            .then(function (response) {
                                if (!response.ok) throw new Error('lock-failed');
                                window.location.replace('{{ url_for("login") }}');
                            })
                            .catch(function () {});
                    }
                }
            }
        });
    </script>

    <!-- Mouse4/Mouse5 history tuşlarını engelle; aksi halde loading overlay siyah ekranda kalabiliyor. -->
    <script nonce="{{ csp_nonce }}">
        function clearPageLoadingOverlay() {
            document.body.classList.remove('is-page-loading');
            document.querySelector('.page-loading-overlay')?.setAttribute('aria-hidden', 'true');
        }

        function blockMouseHistoryButton(e) {
            if (e.button === 3 || e.button === 4) {
                e.preventDefault();
                e.stopImmediatePropagation();
                sessionStorage.setItem('kasa-block-mouse-history', '1');
                clearPageLoadingOverlay();
                setTimeout(function () {
                    sessionStorage.removeItem('kasa-block-mouse-history');
                }, 700);
            }
        }

        ['mousedown', 'mouseup', 'auxclick'].forEach(function (eventName) {
            document.addEventListener(eventName, blockMouseHistoryButton, true);
        });
    </script>

    <!-- Mobil geri tuşu loading loop fix -->
    <script nonce="{{ csp_nonce }}">
        window.addEventListener('pageshow', function (e) {
            clearPageLoadingOverlay();
        });
        window.addEventListener('popstate', function () {
            clearPageLoadingOverlay();
            if (sessionStorage.getItem('kasa-block-mouse-history') === '1') {
                sessionStorage.removeItem('kasa-block-mouse-history');
                history.forward();
            }
        });
    </script>

    <!-- Service Worker (PWA) — self-signed SSL mobilde çalışmaz sadece localhost'ta dene -->
    <script nonce="{{ csp_nonce }}">
        if ('serviceWorker' in navigator && (location.hostname === '127.0.0.1' || location.hostname === 'localhost')) {
            var swUrl = '{{ url_for("sw") }}?v=assets-v56';
            navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(function () {});
        }
    </script>
</body>
</html>
